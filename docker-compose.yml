services:

  vector-db:
    image: qdrant/qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      - QDRANT_URL=http://vector-db:6333
    depends_on:
      - vector-db
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3002:80"

volumes:
  qdrant_data: